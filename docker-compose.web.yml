# Compose for the public web surfaces — landing + docs.
#
# Run:  docker compose -f docker-compose.web.yml up -d --build
#
# Each service is a self-contained Bun-build → nginx-serve image. No volumes,
# no shared state, fully replaceable. Front them with a reverse proxy
# (Caddy / Cloudflare / Traefik) terminating TLS and routing by hostname.

services:
  landing:
    build:
      context: ./landing
    image: cogworks/landing:latest
    container_name: cogworks-landing
    restart: unless-stopped
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  docs:
    build:
      context: ./site
    image: cogworks/docs:latest
    container_name: cogworks-docs
    restart: unless-stopped
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
